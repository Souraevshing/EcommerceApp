server:
  port: 8881

spring:
  profiles:
    active: default
  application:
    name: configserver

  cloud:
    config:
      server:
        git:
          uri: ${GITHUB_URI}
          privateKey: ${GITHUB_PRIVATE_KEY_PATH}
          clone-on-start: true
          default-label: main
          skip-ssl-validation: false
          timeout: 10

management:
  endpoints:
    web:
      exposure:
        include: refresh
