# Fetch configuration dynamically directly from a private GitHub repository using git
  cloud:
    config:
      server:
        git:
          uri: ${GITHUB_URI}
          privateKey: ${GITHUB_PRIVATE_KEY_PATH}
          clone-on-start: true
          default-label: main
          skip-ssl-validation: false
          timeout: 10

management:
  endpoints:
    web:
      exposure:
        include: refresh

# Encrypt the configuration using AES encryption
#encrypt:
#  key: "0EW12EA6YUIATRUVONIN"

# Encrypt the configuration using a key store
encrypt:
  key-store:
    location: ${KEY_STORE_PATH}
    password: ${KEY_STORE_PASSWORD}
    alias: ${KEY_STORE_ALIAS}
