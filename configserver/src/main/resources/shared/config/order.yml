spring:
  datasource:
    url: ${POSTGRES_DB_URL}
    username: ${POSTGRES_DB_USER}
    password: ${POSTGRES_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8881

info:
  app:
    name: order
    description: Order service for ecommerce app
    version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0

  metrics:
    export:
      prometheus:
        enabled: true

  endpoint:
    health:
      show-details: always

  info:
    env:
      enabled: true